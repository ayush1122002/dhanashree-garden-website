name: Build and Push to Release Branch

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Vite app
        run: npm run build

      - name: Deploy dist to release branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone release branch into temp folder
          git clone --branch release https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} release-branch || git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} release-branch

          cd release-branch

          # Remove old files except .git
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # Copy fresh build files
          cp -r ../dist/* .

          # Optional: for SPA routing support
          cp index.html 404.html || true

          git add .
          git commit -m "Auto deploy from main [skip ci]" || echo "No changes to commit"
          git push origin release --force
