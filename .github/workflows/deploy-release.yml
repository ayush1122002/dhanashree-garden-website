name: Build and Push to Release Branch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Add cPanel deployment file
        run: |
          cat > dist/.cpanel.yml << 'EOF'
          ---
          deployment:
            tasks:
              - export DEPLOYPATH=/home/dhanashr/public_html/
              - /bin/cp -R . $DEPLOYPATH
          EOF

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html || true

      - name: Add .htaccess for React Router
        run: |
          cat > dist/.htaccess << 'EOF'
          RewriteEngine On
          RewriteBase /
          RewriteRule ^index\.html$ - [L]
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule . /index.html [L]
          EOF

      - name: Push dist to release branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: release
          publish_dir: ./dist
